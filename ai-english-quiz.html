<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 瞬間英作文 - Gemini Nano</title>
  
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel (ブラウザ上でJSXをコンパイルするため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwindのカスタムアニメーションの補完 -->
  <style>
    .animate-in {
      animation: fade-in-slide-up 0.5s ease-out forwards;
    }
    @keyframes fade-in-slide-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* レベルアップ時の振動アニメーション */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-2deg); }
      75% { transform: translateX(4px) rotate(2deg); }
    }
    .shake-animation {
      animation: shake 0.4s ease-in-out;
    }
  </style>
</head>
<body>
  <!-- Reactアプリのマウントポイント -->
  <div id="root"></div>

  <!-- Reactコード (ES Modules + JSX) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { BookOpen, PenTool, CheckCircle, RefreshCw, AlertTriangle, Send, ChevronRight, MessageSquare, Info, Flame, Settings2 } from 'https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0';

    // 出題テーマの定義
    const TOPICS = [
      { id: 'daily', label: '日常会話', desc: '普段の生活で使うカジュアルな表現' },
      { id: 'business', label: 'ビジネス英語', desc: 'オフィス、会議、メールで使うフォーマルな表現' },
      { id: 'tech', label: 'IT・コードレビュー', desc: 'エンジニア同士の技術的な会話やコードレビューのコメント' },
      { id: 'travel', label: '海外旅行', desc: '旅行先のホテル、空港、レストランでの会話' },
      { id: 'romance', label: '恋愛・ドラマ', desc: '映画やドラマに出てくるような少し感情的な表現' }
    ];

    // カラーテーマの定義（Tailwind CDNがパースできるように完全なクラス名を記述）
    const COLOR_THEMES = {
      green: { iconBg: 'bg-green-600', text: 'text-green-600', bgLight: 'bg-green-50/50', button: 'bg-green-600 hover:bg-green-700', badge: 'bg-white text-green-700 border-green-200', outline: 'focus:ring-green-500' },
      teal: { iconBg: 'bg-teal-600', text: 'text-teal-600', bgLight: 'bg-teal-50/50', button: 'bg-teal-600 hover:bg-teal-700', badge: 'bg-white text-teal-700 border-teal-200', outline: 'focus:ring-teal-500' },
      blue: { iconBg: 'bg-blue-600', text: 'text-blue-600', bgLight: 'bg-blue-50/50', button: 'bg-blue-600 hover:bg-blue-700', badge: 'bg-white text-blue-700 border-blue-200', outline: 'focus:ring-blue-500' },
      orange: { iconBg: 'bg-orange-600', text: 'text-orange-600', bgLight: 'bg-orange-50/50', button: 'bg-orange-600 hover:bg-orange-700', badge: 'bg-orange-100 text-orange-800 border-orange-300', outline: 'focus:ring-orange-500' },
      red: { iconBg: 'bg-red-600', text: 'text-red-600', bgLight: 'bg-red-50/80', button: 'bg-red-600 hover:bg-red-700', badge: 'bg-red-100 text-red-800 border-red-300 shadow-sm', outline: 'focus:ring-red-500' },
      purple: { iconBg: 'bg-purple-700', text: 'text-purple-700', bgLight: 'bg-purple-100/50', button: 'bg-purple-700 hover:bg-purple-800', badge: 'bg-purple-700 text-white border-purple-800 shadow-md', outline: 'focus:ring-purple-500' },
      slate: { iconBg: 'bg-slate-900', text: 'text-slate-900', bgLight: 'bg-slate-200/50', button: 'bg-slate-900 hover:bg-black', badge: 'bg-black text-red-500 border-red-700 shadow-lg', outline: 'focus:ring-slate-900' }
    };

    function App() {
      const [aiStatus, setAiStatus] = useState('checking');
      const [downloadProgress, setDownloadProgress] = useState(0);
      const [appState, setAppState] = useState('generating');
      const [question, setQuestion] = useState('');
      const [userAnswer, setUserAnswer] = useState('');
      const [feedback, setFeedback] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');
      const [isMockMode, setIsMockMode] = useState(false);
      
      const [correctCount, setCorrectCount] = useState(0);
      const [streakCount, setStreakCount] = useState(0);
      const [levelUpAnim, setLevelUpAnim] = useState(false);
      
      // 選択中の出題テーマ
      const [selectedTopic, setSelectedTopic] = useState('daily');
      // 出題時に実際に使用されたテーマ（UIのラグ防止のため保持）
      const [activeTopicLabel, setActiveTopicLabel] = useState('');

      const generatorSession = useRef(null);
      const graderSession = useRef(null);
      const textareaRef = useRef(null);

      // レベル情報を取得する関数
      const getLevelInfo = (count) => {
        if (count >= 12) return { name: "悪魔レベル (ネイティブ級)", emoji: "👿", color: "slate", prompt: "ネイティブスピーカーが使うような高度な慣用句や複雑なニュアンスを含む、非常に難解で洗練された文" };
        if (count >= 10) return { name: "TOEIC 800点レベル", emoji: "💀", color: "purple", prompt: "フォーマルで複雑な文、または専門的な内容を含む文" };
        if (count >= 8) return { name: "大学受験・英検2級レベル", emoji: "⚡", color: "red", prompt: "抽象的な概念や仮定法、倒置などの複雑な文法を含む長めの文" };
        if (count >= 6) return { name: "高校基礎・英検準2級レベル", emoji: "🔥", color: "orange", prompt: "関係副詞や比較表現などを含む、少し複雑な文" };
        if (count >= 4) return { name: "中3・英検3級レベル", emoji: "📘", color: "blue", prompt: "関係代名詞や現在完了を使った、少し長めの基本的な文" };
        if (count >= 2) return { name: "中2レベル", emoji: "🌿", color: "teal", prompt: "過去形や未来形、不定詞や動名詞を使った簡単な会話" };
        return { name: "中1・英検5級レベル", emoji: "🌱", color: "green", prompt: "中学1年生レベルの非常に簡単で短い挨拶や日常の文。be動詞や一般動詞の現在形のみ。" };
      };

      const currentLevel = getLevelInfo(correctCount);
      const theme = COLOR_THEMES[currentLevel.color];

      useEffect(() => {
        const initAI = async () => {
          try {
            const LM = window.LanguageModel || (window.ai && window.ai.languageModel);
            if (!LM) { setAiStatus('unsupported'); return; }

            let isAvailable = 'no';
            let needsDownload = false;

            if (typeof LM.availability === 'function') {
              isAvailable = await LM.availability();
              if (isAvailable === 'no') { setAiStatus('unsupported'); return; }
              if (isAvailable !== 'available') needsDownload = true;
            } else if (typeof LM.capabilities === 'function') {
              const cap = await LM.capabilities();
              isAvailable = cap.available;
              if (isAvailable === 'no') { setAiStatus('unsupported'); return; }
              if (isAvailable !== 'readily') needsDownload = true;
            } else {
              setAiStatus('unsupported'); return;
            }

            if (needsDownload) setAiStatus('downloading');

            // 出題用セッション（システムプロンプトは汎用的なものにしておき、ユーザープロンプトで条件を付与する）
            generatorSession.current = await LM.create({
              systemPrompt: "あなたは英語学習アプリの出題者です。指定されたレベルとテーマに合わせた自然な日本語の文を「1つだけ」出力してください。余計な説明や英語の解答は絶対に含めず、日本語の文のみを出力してください。",
              monitor(m) {
                m.addEventListener('downloadprogress', (e) => {
                  if (e.total > 0) setDownloadProgress(Math.round((e.loaded / e.total) * 100));
                });
              }
            });

            graderSession.current = await LM.create({
              systemPrompt: "あなたは親切な英語の先生です。ユーザーが入力した英語の翻訳を採点し、日本語で丁寧にフィードバック（赤ペン指導）を行ってください。"
            });

            setAiStatus('ready');
            generateNextQuestion(0, 'daily');

          } catch (error) {
            console.error("AI Initialization Error:", error);
            const errMsg = error.message || String(error);
            
            if (errMsg.includes('Permission Policy') || errMsg.includes('Access denied')) {
              setIsMockMode(true);
              setAiStatus('ready');
              
              generatorSession.current = {
                prompt: async (p) => {
                  await new Promise(resolve => setTimeout(resolve, 800));
                  // モック時の適当な出し分け
                  if (p.includes("IT・コードレビュー")) return "この関数のパフォーマンスを改善するために、キャッシュを導入すべきだと思います。";
                  if (p.includes("ビジネス")) return "明日の15時までに、会議の議事録を共有していただけますか？";
                  if (p.includes("ネイティブ級")) return "彼がその計画に難色を示したのも無理はない、そもそも最初から破綻していたのだから。";
                  if (p.includes("中3")) return "私はシカゴに住んでいる友人を訪ねるつもりです。";
                  return "明日は晴れるといいな。";
                }
              };

              graderSession.current = {
                prompt: async () => {
                  await new Promise(resolve => setTimeout(resolve, 1500));
                  return `評価: Good\n模範解答: (Mock Answer) It's just a mock translation.\n解説: 【※これはモックモードの自動応答です】\nプレビュー環境のセキュリティ制限により、Gemini Nanoにアクセスできませんでした。アプリのUIや画面遷移を確認するためのダミーフィードバックを表示しています。`;
                }
              };
              
              generateNextQuestion(0, 'daily');
            } else {
              setAiStatus('unsupported');
              setErrorMsg(errMsg);
            }
          }
        };

        initAI();
      // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      useEffect(() => {
        if (appState === 'answering' && textareaRef.current) {
          textareaRef.current.focus();
        }
      }, [appState]);

      useEffect(() => {
        const handleGlobalKeyDown = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            if (appState === 'feedback') {
              e.preventDefault();
              generateNextQuestion(correctCount, selectedTopic);
            }
          }
        };
        window.addEventListener('keydown', handleGlobalKeyDown);
        return () => window.removeEventListener('keydown', handleGlobalKeyDown);
      }, [appState, correctCount, selectedTopic]);

      const generateNextQuestion = async (currentCorrectCount, topicId) => {
        setAppState('generating');
        setUserAnswer('');
        setFeedback(null);
        setErrorMsg('');

        const targetLevel = getLevelInfo(currentCorrectCount);
        const currentTopic = TOPICS.find(t => t.id === topicId) || TOPICS[0];
        setActiveTopicLabel(currentTopic.label); // 表示用にセット

        try {
          const prompt = `英語の翻訳練習になる日本語の文を「1つ」だけ出力してください。\n条件：\n・難易度：${targetLevel.name}（${targetLevel.prompt}）\n・テーマ・シチュエーション：${currentTopic.label}（${currentTopic.desc}）\n・出力は日本語の文のみにしてください（英語や解説は絶対に含めないでください）。`;
          
          let generatedText = await generatorSession.current.prompt(prompt);
          generatedText = generatedText.replace(/['"]/g, '').trim();
          setQuestion(generatedText);
          setAppState('answering');
        } catch (error) {
          console.error("Question Generation Error:", error);
          setErrorMsg('問題の生成中にエラーが発生しました。もう一度お試しください。');
          setAppState('answering');
        }
      };

      const submitAnswer = async () => {
        if (!userAnswer.trim()) return;
        setAppState('grading');
        setErrorMsg('');

        try {
          const prompt = `以下の【お題】の日本語の文に対する、【生徒の回答】の英語翻訳を採点し、フィードバックを行ってください。\n\n【お題】: ${question}\n【生徒の回答】: ${userAnswer}\n\n以下の形式で厳密に出力してください。\n評価: (Perfect, Good, Needs Improvement のいずれか)\n模範解答: (より自然で正確な英語の翻訳例)\n解説: (生徒の回答の良かった点、文法の修正点、模範解答の解説などを日本語で短く丁寧に)`;
          const aiFeedback = await graderSession.current.prompt(prompt);
          
          const evaluationMatch = aiFeedback.match(/評価:\s*(.*)/)?.[1] || 'Good';
          const parsedFeedback = {
            evaluation: evaluationMatch,
            modelAnswer: aiFeedback.match(/模範解答:\s*(.*)/)?.[1] || '(模範解答を取得できませんでした)',
            explanation: aiFeedback.match(/解説:\s*([\s\S]*)/)?.[1] || aiFeedback,
          };

          const isCorrect = /perfect|good|excellent/i.test(evaluationMatch);
          if (isCorrect) {
            const nextCount = correctCount + 1;
            setCorrectCount(nextCount);
            setStreakCount(prev => prev + 1);
            
            // レベルアップしたかどうかを判定してアニメーションをトリガー
            const prevLevel = getLevelInfo(correctCount);
            const nextLevelInfo = getLevelInfo(nextCount);
            if (prevLevel.name !== nextLevelInfo.name) {
              setLevelUpAnim(true);
              setTimeout(() => setLevelUpAnim(false), 1000);
            }
          } else {
            setStreakCount(0);
          }

          setFeedback(parsedFeedback);
          setAppState('feedback');
        } catch (error) {
          console.error("Grading Error:", error);
          setErrorMsg('採点中にエラーが発生しました。');
          setAppState('answering');
        }
      };

      const handleTextareaKeyDown = (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
          e.preventDefault();
          if (userAnswer.trim() && appState === 'answering') {
            submitAnswer();
          }
        }
      };

      if (aiStatus === 'checking') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className="text-center text-slate-500 flex flex-col items-center">
              <RefreshCw className="w-8 h-8 animate-spin mb-4 text-blue-500" />
              <p>Chrome Built-in AI (Gemini Nano) を確認しています...</p>
            </div>
          </div>
        );
      }

      if (aiStatus === 'downloading') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border border-blue-100">
              <RefreshCw className="w-12 h-12 animate-spin mb-4 text-blue-500 mx-auto" />
              <h1 className="text-xl font-bold text-slate-800 mb-2">AIモデルを準備中...</h1>
              <p className="text-sm text-slate-600 mb-6">初回のみ、ブラウザにGemini Nanoのモデルをダウンロードしています。<br/>ファイルサイズが大きいため数分かかる場合があります。</p>
              <div className="w-full bg-slate-200 rounded-full h-2.5 mb-2 overflow-hidden">
                <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${downloadProgress}%` }}></div>
              </div>
              <p className="text-xs text-slate-500 font-medium">{downloadProgress}% 完了</p>
            </div>
          </div>
        );
      }

      if (aiStatus === 'unsupported') {
        return (
          <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center border border-red-100">
              <AlertTriangle className="w-12 h-12 text-red-500 mx-auto mb-4" />
              <h1 className="text-xl font-bold text-slate-800 mb-2">Built-in AIが利用できません</h1>
              <div className="text-sm text-slate-600 mb-2 text-left">
                <p>このアプリはクライアントサイドのBuilt-in AI (Gemini Nano) を利用します。<br/>最新のGoogle Chromeで <code>chrome://flags</code> を開き、以下を有効にしてください：</p>
                <ul className="list-disc list-inside mt-2 font-mono text-xs bg-slate-100 p-2 rounded">
                  <li>Prompt API for Gemini Nano</li>
                  <li>Enables optimization guide on device</li>
                </ul>
              </div>
              {errorMsg && (
                <div className="mt-4 p-4 bg-red-50 text-red-800 rounded-xl text-xs text-left border border-red-200 shadow-inner">
                  <div className="flex items-center mb-2 font-bold text-red-600"><AlertTriangle className="w-4 h-4 mr-1 flex-shrink-0" />エラー詳細:</div>
                  <p className="font-mono break-words bg-white p-2 rounded border border-red-100">{errorMsg}</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      return (
        <div className={`min-h-screen flex flex-col items-center py-12 p-4 font-sans text-slate-800 transition-colors duration-700 ${currentLevel.color === 'slate' ? 'bg-slate-950' : 'bg-slate-50'}`}>
          <div className="max-w-2xl w-full">
            {isMockMode && (
              <div className="mb-6 bg-orange-100 border-l-4 border-orange-500 text-orange-800 p-4 rounded-r-xl shadow-sm text-sm">
                <p className="font-bold flex items-center mb-1"><Info className="w-4 h-4 mr-2" />UIプレビュー用のモックモード</p>
                <p className="leading-relaxed text-orange-700">現在の環境ではAI機能がブロックされているためダミーデータで動作しています。実際にAIを動かすにはローカル環境で実行してください。</p>
              </div>
            )}

            {/* ヘッダー */}
            <header className="flex items-center justify-between mb-6 px-2">
              <div className="flex items-center space-x-3">
                <div className={`p-2 rounded-xl text-white transition-colors duration-500 ${theme.iconBg}`}>
                  <BookOpen className="w-6 h-6" />
                </div>
                <div>
                  <h1 className={`text-2xl font-bold tracking-tight transition-colors duration-500 ${currentLevel.color === 'slate' ? 'text-slate-100' : 'text-slate-800'}`}>AI 瞬間英作文</h1>
                  <p className={`text-xs ${currentLevel.color === 'slate' ? 'text-slate-400' : 'text-slate-500'}`}>Powered by On-Device Gemini Nano</p>
                </div>
              </div>
              
              {/* スコア・連続正解表示 */}
              <div className="flex flex-col items-end">
                <div className={`flex items-center space-x-1 px-3 py-1 rounded-full text-sm font-bold shadow-sm border transition-colors duration-300
                  ${streakCount > 0 ? (currentLevel.color === 'slate' ? 'bg-red-950/50 text-red-500 border-red-900' : 'bg-orange-50 text-orange-600 border-orange-200') : (currentLevel.color === 'slate' ? 'bg-slate-800 text-slate-500 border-slate-700' : 'bg-slate-100 text-slate-400 border-slate-200')}`}>
                  <Flame className={`w-4 h-4 ${streakCount > 0 ? 'animate-pulse' : ''}`} />
                  <span>{streakCount} 連続</span>
                </div>
                <div className={`text-xs mt-1 font-medium ${currentLevel.color === 'slate' ? 'text-slate-400' : 'text-slate-500'}`}>
                  合計正解: {correctCount}
                </div>
              </div>
            </header>

            {/* 設定コントロールバー */}
            <div className="flex justify-between items-center mb-4 px-2">
              <div className="flex items-center space-x-2">
                <Settings2 className={`w-4 h-4 ${currentLevel.color === 'slate' ? 'text-slate-400' : 'text-slate-500'}`} />
                <span className={`text-sm font-bold ${currentLevel.color === 'slate' ? 'text-slate-400' : 'text-slate-600'}`}>
                  出題テーマ:
                </span>
                <select
                  value={selectedTopic}
                  onChange={(e) => setSelectedTopic(e.target.value)}
                  className={`text-sm font-bold py-1.5 px-3 rounded-xl border outline-none transition-colors cursor-pointer shadow-sm
                    ${currentLevel.color === 'slate' 
                      ? 'bg-slate-800 text-slate-200 border-slate-700 focus:border-red-500' 
                      : 'bg-white text-slate-700 border-slate-200 focus:border-blue-500'}`}
                >
                  {TOPICS.map(t => (
                    <option key={t.id} value={t.id}>{t.label}</option>
                  ))}
                </select>
              </div>
            </div>

            {/* メインカード */}
            <main className={`bg-white rounded-3xl shadow-lg overflow-hidden transition-all duration-500 ${currentLevel.color === 'slate' ? 'border-2 border-red-900 shadow-red-900/20' : 'border border-slate-200'}`}>
              {/* 問題セクション */}
              <div className={`p-8 border-b transition-colors duration-500 ${theme.bgLight} ${currentLevel.color === 'slate' ? 'border-red-900/30' : 'border-slate-100'}`}>
                <div className="flex items-center justify-between mb-4">
                  <div className={`flex items-center text-sm font-bold transition-colors duration-500 ${theme.text}`}>
                    <MessageSquare className="w-4 h-4 mr-2" />
                    <span>日本語のお題 <span className="opacity-70 font-normal">({activeTopicLabel})</span></span>
                  </div>
                  {/* 現在の難易度バッジ */}
                  <div className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all duration-500 flex items-center space-x-1.5 ${theme.badge} ${levelUpAnim ? 'shake-animation scale-110' : ''}`}>
                    <span className="text-base leading-none">{currentLevel.emoji}</span>
                    <span>{currentLevel.name}</span>
                  </div>
                </div>
                
                {appState === 'generating' ? (
                  <div className="flex items-center space-x-3 text-slate-400 py-4 text-lg">
                    <RefreshCw className="w-5 h-5 animate-spin" />
                    <span>AIが新しい問題を作っています...</span>
                  </div>
                ) : (
                  <h2 className={`text-2xl font-bold leading-relaxed ${currentLevel.color === 'slate' ? 'text-red-950' : 'text-slate-800'}`}>
                    {question}
                  </h2>
                )}
              </div>

              {/* 回答・フィードバックセクション */}
              <div className={`p-8 ${currentLevel.color === 'slate' ? 'bg-slate-900' : 'bg-white'}`}>
                {appState !== 'feedback' ? (
                  // 回答入力フォーム
                  <div className="space-y-4">
                    <label htmlFor="answer" className={`block text-sm font-semibold flex items-center ${currentLevel.color === 'slate' ? 'text-slate-300' : 'text-slate-600'}`}>
                      <PenTool className="w-4 h-4 mr-2" />
                      英語に翻訳してみましょう
                    </label>
                    <textarea
                      id="answer"
                      ref={textareaRef}
                      value={userAnswer}
                      onChange={(e) => setUserAnswer(e.target.value)}
                      onKeyDown={handleTextareaKeyDown}
                      disabled={appState === 'generating' || appState === 'grading'}
                      placeholder="Type your English translation here..."
                      className={`w-full p-4 rounded-xl border focus:bg-white focus:ring-2 focus:border-transparent transition-all duration-200 resize-none h-32 text-lg
                        ${currentLevel.color === 'slate' ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-slate-50 border-slate-200 text-slate-800 placeholder-slate-400'}
                        ${theme.outline}`}
                    />
                    
                    {errorMsg && <p className="text-red-500 text-sm flex items-center"><AlertTriangle className="w-4 h-4 mr-1"/>{errorMsg}</p>}

                    <div className="flex justify-end pt-2">
                      <button
                        onClick={submitAnswer}
                        disabled={!userAnswer.trim() || appState !== 'answering'}
                        className={`flex items-center px-6 py-3 rounded-xl font-bold text-white transition-all duration-300 shadow-sm
                          ${!userAnswer.trim() || appState !== 'answering' 
                            ? (currentLevel.color === 'slate' ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-slate-300 cursor-not-allowed')
                            : `${theme.button} hover:shadow-md active:scale-95`}`}
                      >
                        {appState === 'grading' ? (
                          <><RefreshCw className="w-5 h-5 mr-2 animate-spin" />AI先生が採点中...</>
                        ) : (
                          <><Send className="w-5 h-5 mr-2" />回答を提出<span className="text-xs opacity-60 ml-2 bg-black/20 px-2 py-0.5 rounded">⌘ Enter</span></>
                        )}
                      </button>
                    </div>
                  </div>
                ) : (
                  // AIの赤ペン指導（フィードバック）表示
                  <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    {/* ユーザーの回答 */}
                    <div className={`rounded-xl p-5 border ${currentLevel.color === 'slate' ? 'bg-slate-800 border-slate-700' : 'bg-slate-50 border-slate-100'}`}>
                      <div className="text-xs text-slate-500 font-semibold mb-1 uppercase tracking-wider">Your Answer</div>
                      <div className={`text-lg ${currentLevel.color === 'slate' ? 'text-slate-200' : 'text-slate-800'}`}>{userAnswer}</div>
                    </div>

                    {/* 赤ペン評価 */}
                    <div className={`relative rounded-2xl p-6 border shadow-inner ${currentLevel.color === 'slate' ? 'bg-red-950/20 border-red-900/50' : 'bg-red-50 border-red-100'}`}>
                      <div className="absolute -top-3 -right-3 transform rotate-12">
                         <span className={`inline-block px-4 py-1 rounded-full text-sm font-bold border-2 shadow-sm bg-white
                           ${feedback.evaluation.toLowerCase().includes('perfect') ? 'text-red-600 border-red-600' : 
                             feedback.evaluation.toLowerCase().includes('good') ? 'text-orange-500 border-orange-500' : 
                             'text-blue-500 border-blue-500'}`}>
                           {feedback.evaluation}
                         </span>
                      </div>

                      <div className="space-y-4">
                        <div>
                          <div className={`text-xs font-bold mb-1 flex items-center ${currentLevel.color === 'slate' ? 'text-red-500' : 'text-red-400'}`}>
                            <CheckCircle className="w-4 h-4 mr-1" />
                            模範解答 (Model Answer)
                          </div>
                          <div className={`text-xl font-bold font-serif ${currentLevel.color === 'slate' ? 'text-red-400' : 'text-red-600'}`}>
                            {feedback.modelAnswer}
                          </div>
                        </div>

                        <div className={`w-full h-px ${currentLevel.color === 'slate' ? 'bg-red-900/50' : 'bg-red-200/50'}`}></div>

                        <div>
                          <div className={`text-xs font-bold mb-2 flex items-center ${currentLevel.color === 'slate' ? 'text-red-500' : 'text-red-400'}`}>
                            <PenTool className="w-4 h-4 mr-1" />
                            AI先生の解説
                          </div>
                          <p className={`leading-relaxed text-sm whitespace-pre-wrap ${currentLevel.color === 'slate' ? 'text-slate-300' : 'text-red-900'}`}>
                            {feedback.explanation}
                          </p>
                        </div>
                      </div>
                    </div>

                    {/* 次の問題へボタン */}
                    <div className="flex justify-center pt-4">
                      <button
                        onClick={() => generateNextQuestion(correctCount, selectedTopic)}
                        className={`flex items-center px-8 py-4 text-white rounded-full font-bold transition-all duration-300 shadow-lg hover:shadow-xl active:scale-95 group
                          ${theme.button}`}
                      >
                        次の問題へ
                        <span className="text-xs opacity-70 ml-2 bg-black/30 px-2 py-0.5 rounded text-white">⌘ Enter</span>
                        <ChevronRight className="w-5 h-5 ml-1 group-hover:translate-x-1 transition-transform" />
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
